<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{
    --accent:#E8820C; --accent-hover:#D4760A; --accent-soft:#FFF5EA; --accent-softborder:#F3C896;
    --win:#F4F4F6; --title:#ECECEE; --bottom:#FAFAFB;
    --card:#FFFFFF; --card-border:#E6E6E8;
    --field:#FBFBFC; --field-border:#D4D4D8;
    --t-head:#1C1C1E; --t-body:#3A3A3E; --t-label:#6B6B70; --t-mut:#9A9A9E; --t-help:#B0B0B4; --t-caps:#A0A0A4;
    --div:#DEDEDF; --div2:#E2E2E4; --div3:#EAEAEC;
  }
  *{box-sizing:border-box; margin:0;}
  html,body{height:100%;}
  body{background:var(--win); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
       color:var(--t-body); -webkit-font-smoothing:antialiased; user-select:none;}
  .titlebar{display:flex; align-items:center; gap:8px; padding:13px 18px; background:var(--title);
            border-bottom:1px solid var(--div); -webkit-app-region:drag;}
  .dot{width:12px;height:12px;border-radius:50%;}
  .app-mini{margin-left:8px; font-size:12px; font-weight:600; color:var(--t-label);}
  .ver{margin-left:auto; font-size:11px; color:#A8A8AC;}
  .header{display:flex; align-items:center; gap:14px; padding:20px 26px 16px;}
  .header h1{font-size:20px; font-weight:700; color:var(--t-head); letter-spacing:-.01em;}
  .header .sub{font-size:12px; color:var(--t-mut);}
  .tabs{display:inline-flex; background:#E4E4E6; padding:3px; border-radius:10px; margin:0 26px;}
  .tab{font-size:13px; font-weight:500; color:#7A7A7E; padding:6px 18px; border-radius:8px; cursor:pointer; transition:.12s;}
  .tab:hover{color:#3A3A3E;}
  .tab.active{background:#fff; color:var(--t-head); font-weight:600; box-shadow:0 1px 2px rgba(0,0,0,.12);}
  .content{padding:14px 26px 22px; min-height:420px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .full{grid-column:1 / -1;}
  .card{background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:18px;}
  .cardH{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--t-caps); margin-bottom:14px;}
  .row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .row:last-child{margin-bottom:0;}
  label.lbl{font-size:12px; color:var(--t-label); flex-shrink:0;}
  .help{font-size:11px; color:var(--t-help); margin-top:-4px; margin-bottom:8px;}
  input.f, select.f{font-family:inherit; font-size:13px; color:var(--t-body); background:var(--field);
       border:1px solid var(--field-border); border-radius:8px; padding:6px 9px; outline:none; transition:.12s;}
  input.f:focus, select.f:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,130,12,.15);}
  input.f.flex{flex:1; min-width:0;}
  .unit{font-size:12px; color:var(--t-mut);}
  /* checkbox */
  .chk{display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--t-body); cursor:pointer;}
  .chk input{display:none;}
  .box{width:17px;height:17px;border-radius:5px;border:1.5px solid #C8C8CC; display:flex;align-items:center;justify-content:center; transition:.12s;}
  .chk input:checked + .box{background:var(--accent); border-color:var(--accent);}
  .box svg{opacity:0;}
  .chk input:checked + .box svg{opacity:1;}
  /* buttons */
  .btn{font-family:inherit; font-size:12px; color:var(--t-body); background:#fff; border:1px solid var(--field-border);
       border-radius:8px; padding:7px 14px; cursor:pointer; transition:.12s;}
  .btn:hover{background:#F4F4F6;}
  .btn.soft{background:var(--accent-soft); border-color:var(--accent-softborder); color:var(--accent-hover); font-weight:600;}
  .btn.primary{background:var(--accent); border:none; color:#fff; font-size:13px; font-weight:600; border-radius:9px;
       padding:8px 22px; box-shadow:0 1px 3px rgba(232,130,12,.4);}
  .btn.primary:hover{background:var(--accent-hover);}
  .btn:disabled{opacity:.5; cursor:default;}
  /* sliders */
  .srow{display:grid; grid-template-columns:130px 1fr 70px; align-items:center; gap:12px; margin-bottom:12px;}
  .srow:last-child{margin-bottom:0;}
  input[type=range]{-webkit-appearance:none; height:5px; border-radius:3px; background:var(--div2); outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:17px;height:17px;border-radius:50%;
       background:#fff; border:1px solid #CFCFD3; box-shadow:0 1px 2px rgba(0,0,0,.15); cursor:pointer;}
  .sval{font-size:12px; color:var(--t-body); text-align:right;}
  .sval.acc{color:var(--accent); font-weight:600;}
  .bottom{border-top:1px solid var(--div2); background:var(--bottom); padding:16px 26px;}
  .actions{display:flex; align-items:center; gap:10px;}
  .actions .primary{margin-left:auto;}
  .outlbl{font-size:11px; font-weight:600; color:var(--t-caps); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.05em;}
  .console{height:120px; overflow:auto; background:#fff; border:1px solid #E6E6E8; border-radius:9px;
       font-family:'SF Mono',Menlo,monospace; font-size:11px; color:#7a7a7e; padding:10px 12px; white-space:pre-wrap; line-height:1.5; user-select:text;}
  .console .err{color:#d23;}
  .console .ok{color:#28a;}
  .pad94{padding-left:94px;}
  .hidden{display:none;}
  /* ---- overlay / sheet ---- */
  .overlay{position:fixed; inset:0; background:rgba(20,20,22,.42); z-index:50;
       display:flex; align-items:center; justify-content:center; padding:28px;}
  .sheet{background:var(--win); border-radius:16px; box-shadow:0 16px 56px rgba(0,0,0,.32);
       width:100%; max-width:920px; max-height:100%; display:flex; flex-direction:column; overflow:hidden;}
  .sheetH{display:flex; align-items:center; gap:12px; padding:15px 22px; background:var(--title);
       border-bottom:1px solid var(--div);}
  .sheetH h2{font-size:15px; font-weight:700; color:var(--t-head); letter-spacing:-.01em;}
  .sheetH .sub{font-size:12px; color:var(--t-mut); margin-top:1px;}
  .sheetX{margin-left:auto; width:28px; height:28px; border-radius:8px; border:1px solid var(--field-border);
       background:#fff; color:var(--t-label); font-size:14px; cursor:pointer; line-height:1; transition:.12s;}
  .sheetX:hover{background:#F4F4F6; color:var(--t-head);}
  .sheetBody{padding:18px 22px 22px; overflow:auto;}
  .tom{font-size:13px; color:var(--t-mut); text-align:center; padding:48px 20px;}
  /* thumbnail grid */
  .thumbgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(176px,1fr)); gap:12px;}
  .thumb{background:var(--card); border:1px solid var(--card-border); border-radius:10px; overflow:hidden;}
  .thumb img{width:100%; display:block; background:#222; aspect-ratio:4/3; object-fit:cover;}
  .thumb .cap{font-size:10px; color:var(--t-mut); padding:5px 8px; font-family:'SF Mono',Menlo,monospace;
       overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  /* granska cells */
  .gcell{transition:.12s; border-width:1.5px;}
  .gcell.keepOn{border-color:var(--accent); box-shadow:0 0 0 2px rgba(232,130,12,.18);}
  .gcell.dropOn{opacity:.5;}
  .gbtns{display:flex; gap:6px; padding:7px 8px 4px;}
  .mini{flex:1; font-family:inherit; font-size:11px; padding:5px 0; border-radius:7px; cursor:pointer;
       border:1px solid var(--field-border); background:#fff; color:var(--t-body); transition:.12s;}
  .mini.keep:hover{background:var(--accent-soft); border-color:var(--accent-softborder); color:var(--accent-hover);}
  .mini.drop:hover{background:#FBEAEA; border-color:#E9C2C2; color:#C0392B;}
  .gstate{font-size:10px; color:var(--accent-hover); text-align:center; padding:0 8px 7px; min-height:14px; font-weight:600;}
  /* jämför par */
  .parwrap{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .parcard{background:var(--card); border:2px solid var(--card-border); border-radius:12px; overflow:hidden;
       cursor:pointer; transition:.12s;}
  .parcard:hover{border-color:var(--accent); box-shadow:0 4px 16px rgba(232,130,12,.22); transform:translateY(-2px);}
  .parcard img{width:100%; display:block; background:#222;}
  .parstat{display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--t-mut); margin-top:14px;}
  /* statgrid (jämför körningar) */
  .statgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:6px;}
  .stat{background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:12px; text-align:center;}
  .statN{font-size:22px; font-weight:700; color:var(--t-head);}
  .statN.acc{color:var(--accent);}
  .statL{font-size:11px; color:var(--t-label); margin-top:2px;}
  .lblk{margin-top:14px;}
  .lblkH{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--t-caps); margin-bottom:6px;}
  .lblkB{font-family:'SF Mono',Menlo,monospace; font-size:11px; color:var(--t-body); background:#fff;
       border:1px solid var(--card-border); border-radius:9px; padding:10px 12px; max-height:160px; overflow:auto; line-height:1.6;}
  /* historik */
  .hrow{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--card-border);
       border-radius:11px; padding:12px 14px; margin-bottom:10px;}
  .hrow.miss .htitle{color:#C0392B;}
  .hmain{flex:1; min-width:0;}
  .htitle{font-size:13px; font-weight:600; color:var(--t-head);}
  .hsub{font-size:11px; color:var(--t-mut); margin-top:2px;}
  .hbtns{display:flex; gap:6px; flex-shrink:0;}
  /* okända sporter */
  .orow{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--div3);}
  .orow:last-of-type{border-bottom:none;}
  .oname{flex:1; min-width:0; font-size:13px; color:var(--t-body); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
</style>
</head>
<body>
  <div class="header">
    <img src="icon_256.png" width="40" height="40" alt="" style="display:block">
    <div>
      <h1>Dalecarlia Photo Cull</h1>
      <div class="sub">Sportbildsgallring</div>
    </div>
    <span class="ver" id="ver" style="margin-left:auto; align-self:flex-start; padding-top:4px;"></span>
  </div>

  <div class="tabs">
    <div class="tab" data-tab="leverans">Leverans</div>
    <div class="tab active" data-tab="urval">Urval</div>
    <div class="tab" data-tab="modell">Modell</div>
  </div>

  <div class="content">
    <!-- LEVERANS -->
    <div class="panel hidden" data-panel="leverans">
      <div class="grid">
        <div class="card full">
          <div class="cardH">Källa &amp; match</div>
          <div class="row"><label class="lbl" style="width:84px">Källmapp</label>
            <input class="f flex" id="katalog"><button class="btn" onclick="pick('katalog','dir')">Välj…</button></div>
          <div class="row"><label class="lbl" style="width:84px">Matchinfo</label>
            <input class="f flex" id="matchinfo"></div>
          <div class="help pad94">Hemmalag · Bortalag · Resultat (Halvtid) · ÅÅÅÅMMDD · Arena</div>
        </div>
        <div class="card full">
          <div class="cardH">Export</div>
          <div class="row"><label class="lbl" style="width:84px">Export-rot</label>
            <input class="f flex" id="export_rot"><button class="btn" onclick="pick('export_rot','dir')">Välj…</button></div>
          <div class="row"><label class="lbl" style="width:84px">Fotograf</label>
            <input class="f flex" id="fotograf"></div>
          <div class="row pad94" style="gap:18px">
            <label class="chk"><input type="checkbox" id="export_overskriv"><span class="box">✓</span>Skriv över</label>
            <label class="chk"><input type="checkbox" id="iptc"><span class="box">✓</span>IPTC-bildtexter</label>
            <span class="help" style="margin:0">tom = urval i källkatalogen</span>
          </div>
        </div>
        <div class="card">
          <div class="cardH">Efterbehandling</div>
          <div class="row"><label class="lbl" style="width:96px">Öppna i</label>
            <select class="f flex" id="oppna"></select></div>
          <div class="row"><label class="lbl" style="width:96px">Husstil</label>
            <select class="f flex" id="husstil"></select></div>
          <div class="row"><label class="lbl" style="width:96px">Exp-knuff</label>
            <input class="f" id="exp_bump" style="width:64px"><span class="unit">EV</span></div>
          <div class="row"><label class="lbl" style="width:96px">Leverans-JPG</label>
            <select class="f flex" id="leverans"></select></div>
        </div>
        <div class="card">
          <div class="cardH">Metadata &amp; AI</div>
          <label class="chk" style="margin-bottom:10px"><input type="checkbox" id="xmp"><span class="box">✓</span>XMP-sidecars (upprätning)</label><br>
          <label class="chk" style="margin-bottom:10px"><input type="checkbox" id="xmp_justering"><span class="box">✓</span>XMP: leveransklar</label><br>
          <label class="chk" style="margin-bottom:10px"><input type="checkbox" id="xmp_brus"><span class="box">✓</span>ISO-brus</label><br>
          <label class="chk" style="margin-bottom:10px"><input type="checkbox" id="stjarnor"><span class="box">✓</span>Stjärnor (helhetspoäng)</label><br>
          <div class="row" style="margin-top:2px">
            <label class="chk"><input type="checkbox" id="bildtext_ai"><span class="box">✓</span>Bildtext-AI</label>
            <select class="f flex" id="bildtext_modell"></select>
          </div>
        </div>
      </div>
    </div>

    <!-- URVAL -->
    <div class="panel" data-panel="urval">
      <div class="row" style="gap:20px; margin-bottom:16px">
        <label class="chk"><input type="checkbox" id="ai"><span class="box">✓</span>AI-gallring</label>
        <label class="chk"><input type="checkbox" id="snabb"><span class="box">✓</span>⚡ Snabbläge</label>
        <label class="chk"><input type="checkbox" id="rapport"><span class="box">✓</span>Rapportläge</label>
      </div>
      <div class="grid">
        <div class="card">
          <div class="cardH">Match &amp; urval</div>
          <div class="row"><label class="lbl" style="width:96px">Hemmafärg</label><select class="f flex" id="hemma_farg"></select></div>
          <div class="row"><label class="lbl" style="width:96px">Avspark</label><input class="f" id="avspark" style="width:80px"><span class="unit">HH:MM</span></div>
          <div class="row"><label class="lbl" style="width:96px">Behåll</label><input class="f" id="topp" style="width:60px"><span class="unit">bilder</span></div>
          <div class="row"><label class="lbl" style="width:96px">Burst-gräns</label><input class="f" id="burst_sek" style="width:60px"><span class="unit">sek</span></div>
          <div class="row"><label class="chk"><input type="checkbox" id="bevaka_på"><span class="box">✓</span>Tröjnummer</label>
            <input class="f" id="bevaka" style="width:70px"><span class="help" style="margin:0">9,11 · OCR</span></div>
        </div>
        <div class="card">
          <div class="cardH">Modeller</div>
          <div class="row"><label class="lbl" style="width:80px">YOLO</label><select class="f flex" id="yolo"></select></div>
          <div class="row"><label class="lbl" style="width:80px">Sport</label><select class="f flex" id="sport"></select></div>
          <div class="row"><label class="chk"><input type="checkbox" id="estetik"><span class="box">✓</span>Estetik</label>
            <select class="f" id="estetik_motor" style="width:110px"></select></div>
          <div class="row"><label class="chk"><input type="checkbox" id="modell"><span class="box">✓</span>Personlig modell</label></div>
          <div class="help" id="modellinfo" style="margin-left:0"></div>
        </div>
        <div class="card full">
          <div class="cardH">Viktning</div>
          <div class="srow"><label class="lbl">Firande-boost</label>
            <input type="range" id="firande_boost" min="-3" max="3" step="1"><span class="sval acc" id="v_firande_boost"></span></div>
          <div class="srow"><label class="lbl">Garanti firande</label>
            <input type="range" id="garanti_firande" min="0" max="8" step="1"><span class="sval" id="v_garanti_firande"></span></div>
          <div class="srow"><label class="lbl">Garanti spelare</label>
            <input type="range" id="garanti_bevaka" min="0" max="8" step="1"><span class="sval" id="v_garanti_bevaka"></span></div>
        </div>
      </div>
    </div>

    <!-- MODELL -->
    <div class="panel hidden" data-panel="modell">
      <div class="card" style="margin-bottom:18px">
        <div class="cardH">Träning</div>
        <div class="row"><label class="lbl" style="width:96px">Tränings-rot</label>
          <input class="f flex" id="trana_rot"><button class="btn" onclick="pick('trana_rot','dir')">Välj…</button></div>
        <div class="row" style="margin-top:4px">
          <button class="btn" onclick="okandaSporter()">Okända sporter…</button>
          <button class="btn soft" onclick="trana()">Träna modell…</button>
        </div>
      </div>
      <div class="card">
        <div class="cardH">Granskning</div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px">
          <button class="btn" onclick="granska()">Granska osäkra…</button>
          <button class="btn" onclick="jamforPar()">Jämför par…</button>
          <button class="btn" onclick="histogram()">Histogram…</button>
          <button class="btn" onclick="jamforKorningar()">Jämför körningar…</button>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="actions">
      <button class="btn" onclick="historik()">Historik…</button>
      <button class="btn" onclick="visaUrval()">Visa urval…</button>
      <button class="btn" onclick="efterbehandla()">Efterbehandla…</button>
      <button class="btn primary" id="korbtn" onclick="kor()">Kör cull</button>
    </div>
    <div class="outlbl">Output</div>
    <div class="console" id="console"></div>
  </div>

<script>
const CHK=["ai","xmp","rapport","estetik","modell","snabb","xmp_justering","xmp_brus",
  "iptc","bevaka_på","export_overskriv","bildtext_ai","stjarnor"];
const SLD=["firande_boost","garanti_firande","garanti_bevaka"];
let OPT={};

function $(id){return document.getElementById(id);}
function logLine(t,cls){const c=$("console"); const d=document.createElement("div");
  if(cls)d.className=cls; d.textContent=t; c.appendChild(d); c.scrollTop=c.scrollHeight;}
window.dpcLog=logLine;
window.dpcClear=()=>{$("console").innerHTML="";};
window.dpcDone=(ok)=>{$("korbtn").disabled=false; $("korbtn").textContent="Kör cull";};

function fillSelect(id,arr,val){const s=$(id); s.innerHTML="";
  arr.forEach(o=>{const e=document.createElement("option"); e.value=o; e.textContent=o; s.appendChild(e);});
  if(val!=null) s.value=val;}

function collect(){const d={};
  document.querySelectorAll("input.f,select.f,input[type=range]").forEach(el=>{ if(el.id) d[el.id]=el.value; });
  CHK.forEach(k=>{ if($(k)) d[k]=$(k).checked; });
  return d;}

function apply(s){
  for(const k in s){const el=$(k); if(!el)continue;
    if(el.type==="checkbox") el.checked=!!s[k];
    else el.value=s[k];}
  SLD.forEach(k=>{ if($("v_"+k)) $("v_"+k).textContent = (k==="firande_boost"? (s[k]>0?"+":"")+ (s[k]??0) : (s[k]??0)+" platser"); });
}

async function init(){
  const r = await window.pywebview.api.init();
  OPT=r;
  $("ver").textContent = r.version;
  fillSelect("oppna", r.oppna);
  fillSelect("husstil", r.husstil);
  fillSelect("leverans", r.leverans);
  fillSelect("bildtext_modell", r.bildtext_modell);
  fillSelect("hemma_farg", r.farger);
  fillSelect("yolo", r.yolo);
  fillSelect("sport", r.sport);
  fillSelect("estetik_motor", r.estetik_motor);
  apply(r.settings||{});
  $("modellinfo").textContent = r.modellinfo||"";
  SLD.forEach(k=>{ $(k).oninput=()=>{ const v=$(k).value;
    $("v_"+k).textContent = (k==="firande_boost"? (v>0?"+":"")+v : v+" platser"); }; });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  document.querySelectorAll(".panel").forEach(p=>p.classList.add("hidden"));
  document.querySelector(`[data-panel="${t.dataset.tab}"]`).classList.remove("hidden");
});

async function pick(id,kind){
  const p = await window.pywebview.api.valj_mapp($(id).value);
  if(p) $(id).value=p;
}
async function api(name){ await window.pywebview.api[name](); }

async function kor(){
  $("korbtn").disabled=true; $("korbtn").textContent="Kör…"; window.dpcClear();
  await window.pywebview.api.spara(collect());
  await window.pywebview.api.kor(collect());
}
async function trana(){ window.dpcClear(); await window.pywebview.api.spara(collect()); await window.pywebview.api.trana(collect()); }
async function efterbehandla(){ window.dpcClear(); await window.pywebview.api.spara(collect()); await window.pywebview.api.efterbehandla(collect()); }

// ===== Overlay / granskningsverktyg ==========================================
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,
  c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function tomMsg(t){return `<div class="tom">${esc(t)}</div>`;}

function openSheet(title,sub){
  closeSheet();
  const ov=document.createElement("div"); ov.className="overlay"; ov.id="overlay";
  ov.onclick=e=>{ if(e.target===ov) closeSheet(); };
  ov.innerHTML=`<div class="sheet">
    <div class="sheetH"><div><h2>${esc(title)}</h2><div class="sub">${esc(sub||"")}</div></div>
    <button class="sheetX" onclick="closeSheet()">✕</button></div>
    <div class="sheetBody" id="sheetBody"></div></div>`;
  document.body.appendChild(ov);
  return $("sheetBody");
}
function setSheetSub(t){const e=document.querySelector("#overlay .sheetH .sub"); if(e)e.textContent=t;}
function closeSheet(){const o=$("overlay"); if(o)o.remove();}
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeSheet(); });

// --- Granska osäkra ---
async function granska(){
  const body=openSheet("Granska osäkra","Laddar…");
  const r=await window.pywebview.api.granska_data();
  if(!r.bilder||!r.bilder.length){ setSheetSub("");
    body.innerHTML=tomMsg("Inga osäkra bilder ännu. Kör en cull med personlig modell aktiv först."); return; }
  setSheetSub("Modellen var osäker på dessa — markera Behåll/Förkasta. Dina val används vid nästa träning.");
  const grid=document.createElement("div"); grid.className="thumbgrid"; body.innerHTML=""; body.appendChild(grid);
  r.bilder.forEach(b=>{
    const cell=document.createElement("div"); cell.className="thumb gcell";
    cell.innerHTML=`<img src="${b.thumb}"><div class="cap">p=${b.p}</div>
      <div class="gbtns"><button class="mini keep">Behåll</button><button class="mini drop">Förkasta</button></div>
      <div class="gstate"></div>`;
    const st=cell.querySelector(".gstate");
    const set=v=>{ st.textContent=v===1?"✓ behåll":v===0?"✕ förkasta":"";
      cell.classList.toggle("keepOn",v===1); cell.classList.toggle("dropOn",v===0); };
    set(b.etikett);
    cell.querySelector(".keep").onclick=async()=>{ await window.pywebview.api.satt_etikett(b.stem,true); set(1); };
    cell.querySelector(".drop").onclick=async()=>{ await window.pywebview.api.satt_etikett(b.stem,false); set(0); };
    grid.appendChild(cell);
  });
}

// --- Jämför par ---
let PAR=[], PARI=0;
async function jamforPar(){
  const body=openSheet("Jämför par","Laddar…");
  const r=await window.pywebview.api.par_data(); PAR=r.par||[]; PARI=0;
  if(!PAR.length){ setSheetSub(""); body.innerHTML=tomMsg("För få osäkra bilder. Kör en cull med modell först."); return; }
  renderPar();
}
function renderPar(){
  const body=$("sheetBody"); if(!body) return;
  if(PARI>=PAR.length){ setSheetSub(`${PAR.length} par`); body.innerHTML=tomMsg("Klar — alla par bedömda."); return; }
  setSheetSub("Klicka på den bild du hellre levererar — vinnaren märks Behåll, förloraren Förkasta.");
  const [a,b]=PAR[PARI];
  body.innerHTML=`<div class="parwrap">
    <div class="parcard" id="pa"><img src="${a.thumb}"><div class="cap">p=${a.p}</div></div>
    <div class="parcard" id="pb"><img src="${b.thumb}"><div class="cap">p=${b.p}</div></div></div>
    <div class="parstat">Par ${PARI+1} av ${PAR.length}<button class="btn" id="skip" style="margin-left:14px">Hoppa över</button></div>`;
  $("pa").onclick=()=>valjPar(a,b); $("pb").onclick=()=>valjPar(b,a);
  $("skip").onclick=()=>{ PARI++; renderPar(); };
}
async function valjPar(v,f){ await window.pywebview.api.valj_par(v.stem,f.stem); PARI++; renderPar(); }

// --- Histogram ---
async function histogram(){
  const body=openSheet("Poänghistogram","");
  const r=await window.pywebview.api.histogram_data();
  if(r.tom){ body.innerHTML=tomMsg("Ingen körning loggad ännu. Kör en cull först."); return; }
  setSheetSub(`${r.katalog} · ${r.n_valda} valda av ${r.n_total}${r.tid?" · "+r.tid:""}`);
  body.innerHTML=histogramSVG(r.poang,r.trosk)+
    `<div class="help" style="margin-top:10px">Orange = valt, grått = bortvalt. En tydlig dal vid tröskeln betyder ett rent snitt.</div>`;
}
function histogramSVG(poang,trosk){
  const lo=Math.min(...poang), hi=Math.max(...poang), span=(hi-lo)||1e-6, N=30, bins=new Array(N).fill(0);
  poang.forEach(p=>{ bins[Math.min(Math.floor((p-lo)/span*N),N-1)]++; });
  const maxB=Math.max(...bins)||1, W=840,H=300, mx=36,my=18, bottom=H-my-20, bw=(W-2*mx)/N;
  let bars="";
  for(let i=0;i<N;i++){ const x=mx+i*bw, mid=lo+(i+0.5)/N*span, h=(bins[i]/maxB)*(bottom-my);
    bars+=`<rect x="${(x+1).toFixed(1)}" y="${(bottom-h).toFixed(1)}" width="${(bw-2).toFixed(1)}" height="${h.toFixed(1)}" fill="${mid>=trosk?'var(--accent)':'#C7C7CC'}" rx="1.5"/>`; }
  const tx=mx+(trosk-lo)/span*(W-2*mx);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${bars}
    <line x1="${tx.toFixed(1)}" y1="${my}" x2="${tx.toFixed(1)}" y2="${bottom}" stroke="#D4760A" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="${tx.toFixed(1)}" y="${my-4}" fill="#D4760A" font-size="11" text-anchor="middle" font-family="monospace">tröskel ${trosk.toFixed(2)}</text>
    <line x1="${mx}" y1="${bottom}" x2="${W-mx}" y2="${bottom}" stroke="#CFCFD3"/>
    <text x="${mx}" y="${bottom+15}" fill="#9A9A9E" font-size="10" font-family="monospace">${lo.toFixed(2)}</text>
    <text x="${W-mx}" y="${bottom+15}" fill="#9A9A9E" font-size="10" text-anchor="end" font-family="monospace">${hi.toFixed(2)}</text>
    <text x="${W/2}" y="${bottom+15}" fill="#9A9A9E" font-size="10" text-anchor="middle">poäng →</text></svg>`;
}

// --- Jämför körningar ---
let KOR=[];
async function jamforKorningar(){
  const body=openSheet("Jämför körningar","");
  const r=await window.pywebview.api.korningar_data(); KOR=r.korningar||[];
  if(KOR.length<2){ body.innerHTML=tomMsg("Minst två loggade körningar krävs för jämförelse."); return; }
  const opts=KOR.map((k,i)=>`<option value="${i}">${esc(k.label)}</option>`).join("");
  body.innerHTML=`<div class="row"><label class="lbl" style="width:18px">A</label><select class="f flex" id="korA">${opts}</select></div>
    <div class="row"><label class="lbl" style="width:18px">B</label><select class="f flex" id="korB">${opts}</select></div>
    <div id="korut" style="margin-top:14px"></div>`;
  $("korA").value=0; $("korB").value=Math.min(1,KOR.length-1);
  $("korA").onchange=korJamfor; $("korB").onchange=korJamfor; korJamfor();
}
function korJamfor(){
  const a=KOR[+$("korA").value], b=KOR[+$("korB").value];
  const sa=new Set(a.valda), sb=new Set(b.valda);
  const bada=[...sa].filter(x=>sb.has(x)), baraA=[...sa].filter(x=>!sb.has(x)), baraB=[...sb].filter(x=>!sa.has(x));
  const uni=new Set([...sa,...sb]), jac=uni.size?bada.length/uni.size:0;
  const blk=(t,arr)=>arr.length?`<div class="lblk"><div class="lblkH">${t}</div><div class="lblkB">${arr.sort().map(esc).join("<br>")}</div></div>`:"";
  $("korut").innerHTML=`<div class="statgrid">
    <div class="stat"><div class="statN">${bada.length}</div><div class="statL">Gemensamma</div></div>
    <div class="stat"><div class="statN">${baraA.length}</div><div class="statL">Bara i A</div></div>
    <div class="stat"><div class="statN">${baraB.length}</div><div class="statL">Bara i B</div></div>
    <div class="stat"><div class="statN acc">${Math.round(jac*100)}%</div><div class="statL">Överlapp</div></div></div>
    ${blk("Endast i A",baraA)}${blk("Endast i B",baraB)}`;
}

// --- Historik ---
async function historik(){ const body=openSheet("Historik","Tidigare urval"); await renderHistorik(body); }
async function renderHistorik(body){
  const r=await window.pywebview.api.historik_data();
  if(!r.poster||!r.poster.length){ body.innerHTML=tomMsg("Ingen historik ännu."); return; }
  body.innerHTML=r.poster.map(p=>`<div class="hrow${p.finns?"":" miss"}">
    <div class="hmain"><div class="htitle">${esc(p.rubrik)}</div>
      <div class="hsub">${p.antal} bilder · ${esc(p.datum)}${p.finns?"":" · (saknas)"}</div></div>
    <div class="hbtns">
      <button class="btn" data-act="visa" data-path="${esc(p.path)}" ${p.finns?"":"disabled"}>Miniatyrer</button>
      <button class="btn" data-act="finder" data-path="${esc(p.path)}" ${p.finns?"":"disabled"}>Finder</button>
      <button class="btn" data-act="ta" data-path="${esc(p.path)}">Ta bort</button></div></div>`).join("");
  body.querySelectorAll("button[data-act]").forEach(btn=>{
    btn.onclick=async()=>{ const path=btn.dataset.path;
      if(btn.dataset.act==="visa") visaUrval(path);
      else if(btn.dataset.act==="finder") window.pywebview.api.oppna_finder(path);
      else if(btn.dataset.act==="ta"){ await window.pywebview.api.historik_ta_bort(path); renderHistorik(body); } };
  });
}

// --- Visa urval (strömmas) ---
async function visaUrval(path){
  let mapp=path;
  if(!mapp){ mapp=await window.pywebview.api.valj_urval_mapp($("katalog").value||""); if(!mapp) return; }
  const body=openSheet("Urval","Laddar miniatyrer…");
  body.innerHTML=`<div class="thumbgrid" id="urvalgrid"></div><div class="help" id="urvalstatus" style="margin-top:10px">Extraherar förhandsvisningar…</div>`;
  window.pywebview.api.urval_ladda(mapp);
}

window.dpcUrvalThumb=t=>{ const g=$("urvalgrid"); if(!g)return;
  const c=document.createElement("div"); c.className="thumb";
  c.innerHTML=`<img src="${t.thumb}"><div class="cap">${esc(t.namn)}</div>`; g.appendChild(c); };
window.dpcUrvalDone=n=>{ const s=$("urvalstatus"); if(s)s.textContent=n?`${n} miniatyrer`:"Kunde inte läsa några miniatyrer."; };

// --- Okända sporter ---
async function okandaSporter(){
  const body=openSheet("Okända sporter","");
  const r=await window.pywebview.api.okanda_data();
  if(!r.okanda||!r.okanda.length){ body.innerHTML=tomMsg("Inga oklassificerade uppdrag just nu."); return; }
  setSheetSub("Appen kunde inte avgöra sport. Öppna mappen, välj sport, spara — då tränas modellen om.");
  const opt=s=>`<option value="">—</option>`+r.sporter.map(x=>`<option value="${x}"${x===s?" selected":""}>${x}</option>`).join("");
  body.innerHTML=r.okanda.map((u,i)=>`<div class="orow">
      <div class="oname">${esc(u.namn)}</div>
      <select class="f" id="osp${i}" style="width:130px">${opt(u.sport)}</select>
      <button class="btn" data-path="${esc(u.path)}" ${u.path?"":"disabled"}>Öppna mapp</button></div>`).join("")
    +`<div style="margin-top:16px;text-align:right"><button class="btn soft" id="osave">Spara och träna om</button></div>`;
  body.querySelectorAll(".orow button[data-path]").forEach(b=>b.onclick=()=>window.pywebview.api.oppna_finder(b.dataset.path));
  $("osave").onclick=async()=>{
    const val={}; r.okanda.forEach((u,i)=>{ const v=$("osp"+i).value; if(v) val[u.namn]=v; });
    const res=await window.pywebview.api.okanda_spara(val); closeSheet();
    if(res&&res.tranar){ document.querySelector('[data-tab="modell"]').click(); trana(); }
  };
}
